name: Claude Code

# Responds to "@claude" mentions in issues and PRs — e.g. comment "@claude review"
# on a pull request to get a code review.
#
# Setup (one-time, done on GitHub, not in this repo):
#   1. Install the Claude GitHub App and grant it access to this repo:
#        https://github.com/apps/claude   (or run `/install-github-app` in Claude Code)
#   2. Add an ANTHROPIC_API_KEY repository (or org) secret:
#        gh secret set ANTHROPIC_API_KEY --repo Evan-McCall/research-widget
#
# Note: comment-triggered workflows run from the DEFAULT branch, so this must be
# merged to main before "@claude" mentions will trigger.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
