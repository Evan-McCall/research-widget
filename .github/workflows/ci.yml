name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Skip the postinstall electron-rebuild — better-sqlite3's native binding
      # isn't needed for typecheck / lint / electron-vite build, and rebuilding
      # would download a ~100MB Electron binary unnecessarily.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (electron-vite)
        run: npm run build
